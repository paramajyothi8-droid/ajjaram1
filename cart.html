<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ABS Cart</title>

<style>

body{
font-family:Poppins,sans-serif;
background:#f5f5f5;
padding:30px;
}

h1{
text-align:center;
color:#8A632A;
}

.cart-box{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
display:flex;
justify-content:space-between;
align-items:center;
}

button{
background:red;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
border-radius:5px;
}

.home-btn{
background:#B8860B;
text-decoration:none;
color:white;
padding:10px 20px;
border-radius:25px;
display:inline-block;
margin-bottom:20px;
}

</style>
</head>

<body>

<a href="index.html" class="home-btn">
← Home
</a>

<h1>My Cart</h1>

<div id="cartContainer"></div>

<script>

let cartItems=
JSON.parse(localStorage.getItem("cartItems"))||[];

let output="";

if(cartItems.length===0){

output="<h3>Your Cart Is Empty</h3>";

}else{

cartItems.forEach((item,index)=>{

output+=`

<div class="cart-box">

<span>${item}</span>

<button onclick="removeItem(${index})">
Remove
</button>

</div>

`;

});

}

document.getElementById("cartContainer")
.innerHTML=output;

function removeItem(index){

cartItems.splice(index,1);

localStorage.setItem(
"cartItems",
JSON.stringify(cartItems)
);

location.reload();

}

</script>

</body>
</html>
