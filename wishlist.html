<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ABS Wishlist</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}body{margin:0;font-family:Poppins,sans-serif;background:linear-gradient(180deg,#f9edcf,#edce8e);min-height:100vh;color:#322414}.page{max-width:900px;margin:auto;padding:22px 16px 50px}.top{display:flex;justify-content:space-between;align-items:center}.home-btn{background:#8a632a;color:#fff;text-decoration:none;padding:10px 18px;border-radius:999px;font-weight:600}.clear-btn,.action-btn{border:0;cursor:pointer;font-family:inherit;font-weight:600}.clear-btn{background:#fff;color:#a32626;padding:10px 16px;border-radius:999px;box-shadow:0 4px 14px #00000016}h1{text-align:center;color:#8a632a;margin:18px 0 24px}.wishlist-box{background:#fff;padding:14px;margin-bottom:12px;border-radius:16px;box-shadow:0 6px 18px #00000012;display:grid;grid-template-columns:92px 1fr 220px;gap:14px;align-items:center}.wishlist-box img{width:92px;height:92px;object-fit:cover;border-radius:12px}.name{font-weight:700;margin:0 0 5px}.price{color:#b8860b;font-weight:700;margin:0}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}.action-btn{height:40px;border-radius:8px;color:#fff}.cart{background:#b8860b}.buy{background:#4a3214}.remove{background:#d93636;grid-column:1/-1}.empty{text-align:center;background:#fff;padding:35px 15px;border-radius:18px;box-shadow:0 6px 18px #00000012}@media(max-width:650px){.page{padding:14px 10px 35px}.home-btn,.clear-btn{font-size:12px;padding:8px 12px}h1{font-size:25px;margin-bottom:16px}.wishlist-box{grid-template-columns:72px 1fr;padding:10px;gap:10px}.wishlist-box img{width:72px;height:72px}.actions{grid-column:1/-1}.action-btn{height:36px;font-size:11px}.name{font-size:13px}.price{font-size:12px}}
</style>
</head>
<body>
<main class="page">
<div class="top"><a href="index.html" class="home-btn">← Home</a><button class="clear-btn" onclick="clearWishlist()">Clear Wishlist</button></div>
<h1>My Wishlist</h1>
<div id="wishlistContainer"></div>
</main>
<script>
function getItems(key){try{return JSON.parse(localStorage.getItem(key))||[]}catch(e){return[]}}
function saveItems(key,items){localStorage.setItem(key,JSON.stringify(items))}
function money(value){const n=Number(String(value).replace(/[^0-9.]/g,''))||0;return '₹'+n.toLocaleString('en-IN')}
function render(){const items=getItems('wishlistItems');const box=document.getElementById('wishlistContainer');if(!items.length){box.innerHTML='<div class="empty"><h3>Your Wishlist Is Empty</h3><p>Tap the heart icon on any product to save it here.</p></div>';return}box.innerHTML=items.map((item,index)=>`<article class="wishlist-box"><img src="${item.image||''}" alt="${item.name||'Product'}"><div><p class="name">${item.name||item}</p><p class="price">${money(item.price||0)}</p></div><div class="actions"><button class="action-btn cart" onclick="moveToCart(${index})">Add to Cart</button><button class="action-btn buy" onclick="buyNow(${index})">Buy Now</button><button class="action-btn remove" onclick="removeItem(${index})">Remove</button></div></article>`).join('')}
function removeItem(index){const items=getItems('wishlistItems');items.splice(index,1);saveItems('wishlistItems',items);render()}
function clearWishlist(){localStorage.removeItem('wishlistItems');render()}
function moveToCart(index){const wishes=getItems('wishlistItems');const item=wishes[index];const cart=getItems('cartItems');const existing=cart.find(x=>x.name===item.name);if(existing)existing.qty=(existing.qty||1)+1;else cart.push({...item,qty:1});saveItems('cartItems',cart);alert(item.name+' added to cart!')}
function buyNow(index){const item=getItems('wishlistItems')[index];localStorage.setItem('buyNowItem',JSON.stringify({...item,qty:1}));window.location.href='checkout.html'}
render();
</script>
</body>
</html>
